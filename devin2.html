<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Keren</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: #333;
        }

        header {
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            display: flex;
            justify-content: center;
            background: #222;
        }

        nav a {
            color: white;
            padding: 14px 20px;
            text-decoration: none;
        }

        nav a:hover {
            background: #4facfe;
        }

        .container {
            padding: 40px;
            text-align: center;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        button {
            background: #4facfe;
            border: none;
            padding: 10px 20px;
            color: white;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background: #007bff;
        }

        footer {
            background: #111;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

<header>
    <h1>Website ALEX BHIZER</h1>
    <p>Simple, Modern, dan Keren</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Tentang</a>
    <a href="#">Kontak</a>
</nav>

<div class="container">
    <h2>Selamat Datang!</h2>
    <p>ANAK PEMAI.</p>

    <div class="card">
        <h3>Kartu Informasi</h3>
        <p>devin kenapa ganteng banget anjir.</p>
        <button>Klik Saya</button>
    </div>
</div>

<footer>
    <p>© 2026 Website Devin</p>
</footer>

</body>
</html>
